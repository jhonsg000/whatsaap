<!DOCTYPE html>
<html>
<head>
  <title>Dato curioso</title>
  <style>
    body { 
      font-family: Arial; 
      text-align: center; 
      margin-top: 50px; 
      background-color: #f0f0f0;
    }
    h1 { color: #333; }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background-color: #0056b3; }
    .alerta { 
      background: red; 
      color: white; 
      padding: 20px; 
      font-size: 40px; 
      border-radius: 20px; 
      display: none; 
      margin-top: 20px;
    }
    /* Imagen oculta al inicio */
    #imagen {
      display: none;
      width: 100%;
      height: auto;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Haz clic en el botón</h1>
  <button onclick="mostrarTodo()">Clic aquí</button>
  
  <!-- Imagen oculta -->
  <img id="imagen" src="linda.png" alt="linda">
  
  <!-- Mensaje oculto -->
  <div id="mensaje" class="alerta">
    <b>Así o tengo que decirlo de otra forma para que me creas.</b>
  </div>

  <script>
    function mostrarTodo() {
      // Mostrar mensaje
      document.getElementById("mensaje").style.display = "block";
      // Mostrar imagen
      document.getElementById("imagen").style.display = "block";
    }
  </script>
</body>
</html>
