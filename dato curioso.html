<!DOCTYPE html>
<html>
<head>
<title>Broma Hackeo</title>
<style>
body { font-family: Arial; text-align: center; margin-top: 50px; }
.alerta { background: red; color: white; padding: 20px; font-size: 24px; border-radius: 10px; display: none; }
</style>
</head>
<body>
<h1>Haz clic en el botón</h1>
<button onclick="mostrarAlerta()">Clic aquí</button>
<div id="mensaje" class="alerta">⚠️ ¡Tu WhatsApp acaba de ser hackeado! 😱</div>
<script>
function mostrarAlerta() {
 document.getElementById("mensaje").style.display = "block";
}
</script>
</body>
</html>
